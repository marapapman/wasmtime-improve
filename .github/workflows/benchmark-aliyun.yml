# Performance benchmark workflow running on GitHub-hosted Ubuntu runners.
#
# Triggers:
#   1. Every push to `main` (continuous tracking of trunk performance).
#   2. Manual dispatch from the GitHub Actions UI (workflow_dispatch).
#      Use the `ref` input to benchmark any branch, tag, or commit SHA
#      (e.g. the head of a pull request).
#
# Required repository secrets
# ---------------------------
# GITHUB_TOKEN is provided automatically by GitHub Actions.
# No additional secrets are needed for basic benchmark reporting.
#
# Optional repository variables
# ------------------------------
# BASELINE_ENGINE_PATH  – absolute path on the runner to a pre-built
#                         libwasmtime_bench_api.so that serves as the
#                         comparison baseline (leave unset to benchmark
#                         the current commit only).

name: "Performance Benchmark"

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to benchmark (defaults to the branch this workflow runs on)"
        required: false
        default: ""
      benchmark_suite:
        description: "Sightglass benchmark suite path (relative to sightglass root)"
        required: false
        default: "benchmarks/shootout.suite"
      processes:
        description: "Number of benchmark processes"
        required: false
        default: "3"
      iterations_per_process:
        description: "Iterations per process"
        required: false
        default: "3"

# Minimal token permissions required by this workflow.
permissions:
  contents: read
  issues: write

env:
  BENCHMARK_SUITE: ${{ github.event.inputs.benchmark_suite || 'benchmarks/shootout.suite' }}
  PROCESSES: ${{ github.event.inputs.processes || '3' }}
  ITERATIONS_PER_PROCESS: ${{ github.event.inputs.iterations_per_process || '3' }}

# Only one benchmark run per ref at a time; cancel the previous one.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: "Run benchmarks on GitHub Ubuntu runner"
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout the requested ref (or the default push SHA).
      # ------------------------------------------------------------------
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.sha }}
          submodules: recursive

      # ------------------------------------------------------------------
      # 2. Install Rust (reuse the project's existing action).
      # ------------------------------------------------------------------
      - name: "Install Rust toolchain"
        uses: ./.github/actions/install-rust

      # ------------------------------------------------------------------
      # 3. Run the benchmark script.
      # ------------------------------------------------------------------
      - name: "Run performance benchmarks"
        env:
          BENCHMARK_SUITE: ${{ env.BENCHMARK_SUITE }}
          PROCESSES: ${{ env.PROCESSES }}
          ITERATIONS_PER_PROCESS: ${{ env.ITERATIONS_PER_PROCESS }}
          BASELINE_ENGINE_PATH: ${{ vars.BASELINE_ENGINE_PATH || '' }}
        run: ./performance_benchmark/run_benchmarks.sh

      # ------------------------------------------------------------------
      # 4. Upload all generated artifacts for archival.
      # ------------------------------------------------------------------
      - name: "Upload benchmark artifacts"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            performance_benchmark/output/summary.txt
            performance_benchmark/output/results.json
            performance_benchmark/output/report.html
            performance_benchmark/output/report.md
          if-no-files-found: warn
          retention-days: 90

      # ------------------------------------------------------------------
      # 5. Write the report to the job summary page.
      # ------------------------------------------------------------------
      - name: "Write job summary"
        if: always()
        run: |
          REPORT="performance_benchmark/output/report.md"
          if [[ -f "${REPORT}" ]]; then
            cat "${REPORT}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No benchmark report was generated." >> "${GITHUB_STEP_SUMMARY}"
          fi

      # ------------------------------------------------------------------
      # 6. Create a GitHub issue with the report so it appears in the
      #    repository owner's GitHub notifications inbox (mailbox).
      # ------------------------------------------------------------------
      - name: "Send report to GitHub mailbox via issue"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT="performance_benchmark/output/report.md"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP="$(date -u '+%Y-%m-%d %H:%M UTC')"

          ISSUE_BODY_FILE="$(mktemp)"
          {
            printf 'Triggered by: %s on `%s`\n' "${{ github.event_name }}" "${{ github.ref }}"
            printf 'Run: %s\n\n' "${RUN_URL}"
            if [[ -f "${REPORT}" ]]; then
              cat "${REPORT}"
            else
              printf 'No benchmark report was generated. See the workflow run for details.\n'
            fi
          } > "${ISSUE_BODY_FILE}"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Performance Benchmark Report — ${TIMESTAMP} (run #${{ github.run_id }})" \
            --body-file "${ISSUE_BODY_FILE}" \
            --label "performance" || \
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Performance Benchmark Report — ${TIMESTAMP} (run #${{ github.run_id }})" \
            --body-file "${ISSUE_BODY_FILE}"

          rm -f "${ISSUE_BODY_FILE}"
